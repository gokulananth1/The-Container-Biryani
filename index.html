
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>The Container Biryani - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
      /* Global Invisible Scrollbar Implementation */
      /* This ensures that all scrollable elements (body, modals, sidebars) 
         remain functional but do not show the default browser scrollbar UI. */
      * {
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none; /* IE and Edge */
      }
      *::-webkit-scrollbar {
        display: none; /* Chrome, Safari and Opera */
      }

      body { 
        font-family: 'Inter', sans-serif; 
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .brand-font { font-family: 'Oswald', sans-serif; }
      
      /* Smooth scrolling and enhanced touch interaction */
      html {
        scroll-behavior: smooth;
        -webkit-tap-highlight-color: transparent;
        overflow-x: hidden;
      }
      
      /* Viewport height fix for mobile browsers */
      #root {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      /* Animation for smooth UI transitions */
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fade-in 0.5s ease-out;
      }
    </style>
